# Test Case ID: HM-N01
# Rule: container_security.health_check_missing
# Test Type: negative
# Description: 配置健康检查
# Expected Detection: false
# Expected Severity: N/A
# Code Type: safe

# docker-compose.yml
version: '3.8'
services:
  web:
    image: nginx:1.24
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      
  api:
    image: myapi:1.0.0
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
