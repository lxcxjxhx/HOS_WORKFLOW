# Test Case ID: CB-N01
# Rule: container_security.container_breakout
# Test Type: negative
# Description: 安全的容器配置
# Expected Detection: false
# Expected Severity: N/A
# Code Type: safe

# docker-compose.yml
version: '3.8'
services:
  app:
    image: myapp:1.0.0
    # 不使用 privileged 模式
    # 不共享主机命名空间
    read_only: true               # 只读文件系统
    security_opt:
      - no-new-privileges:true    # 禁止提升权限
    cap_drop:
      - ALL                       # 删除所有能力
    cap_add:
      - NET_BIND_SERVICE          # 仅添加必要能力
    volumes:
      - ./app:/app:ro             # 只读挂载
