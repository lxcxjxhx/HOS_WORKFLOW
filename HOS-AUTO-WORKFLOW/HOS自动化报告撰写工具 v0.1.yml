    - data:
        code: "import zipfile\nimport os\nimport base64\nimport tempfile\n\ndef handler(inputs:\
          \ dict) -> dict:\n    \"\"\"\n    输入：\n        inputs[\"file\"] = 上传的 docx\
          \ 文件（二进制）\n\n    输出：\n        {\n            \"xml_files\": {filename: content},\n\
          \            \"images\": {filename: base64}\n        }\n    \"\"\"\n\n \
          \   file = inputs.get(\"file\")\n\n    if not file:\n        return {\"\
          error\": \"No file provided\"}\n\n    # 创建临时目录\n    with tempfile.TemporaryDirectory()\
          \ as tmpdir:\n        docx_path = os.path.join(tmpdir, \"input.docx\")\n\
          \n        # 写入文件\n        with open(docx_path, \"wb\") as f:\n         \
          \   f.write(file)\n\n        extract_dir = os.path.join(tmpdir, \"unzipped\"\
          )\n        os.makedirs(extract_dir, exist_ok=True)\n\n        # 解压 docx\n\
          \        with zipfile.ZipFile(docx_path, 'r') as zip_ref:\n            zip_ref.extractall(extract_dir)\n\
          \n        xml_files = {}\n        images = {}\n\n        # 遍历解压目录\n    \
          \    for root, dirs, files in os.walk(extract_dir):\n            for name\
          \ in files:\n                full_path = os.path.join(root, name)\n    \
          \            rel_path = os.path.relpath(full_path, extract_dir)\n\n    \
          \            # 提取 XML\n                if name.endswith(\".xml\"):\n   \
          \                 try:\n                        with open(full_path, \"\
          r\", encoding=\"utf-8\") as f:\n                            xml_files[rel_path]\
          \ = f.read()\n                    except:\n                        # 有些\
          \ XML 可能不是 UTF-8\n                        with open(full_path, \"rb\") as\
          \ f:\n                            xml_files[rel_path] = f.read().decode(\"\
          utf-8\", errors=\"ignore\")\n\n                # 提取图片\n                if\
          \ rel_path.startswith(\"word/media/\"):\n                    with open(full_path,\
          \ \"rb\") as f:\n                        images[rel_path] = base64.b64encode(f.read()).decode()\n\
          \n        return {\n            \"xml_files\": xml_files,\n            \"\
          images\": images\n        }"
        code_language: python3
