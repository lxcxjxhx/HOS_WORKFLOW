    - data:
        code: "import zipfile\nimport os\nimport tempfile\n\ndef handler(inputs: dict)\
          \ -> dict:\n    \"\"\"\n    输入：\n        inputs[\"document_xml\"]  -> Word\
          \ XML（必须是WordprocessingML）\n    \n    输出：\n        docx_file（二进制）\n    \"\
          \"\"\n\n    document_xml = inputs.get(\"document_xml\")\n\n    if not document_xml:\n\
          \        return {\"error\": \"Missing document_xml\"}\n\n    with tempfile.TemporaryDirectory()\
          \ as tmpdir:\n        word_dir = os.path.join(tmpdir, \"word\")\n      \
          \  rels_dir = os.path.join(tmpdir, \"_rels\")\n\n        os.makedirs(word_dir,\
          \ exist_ok=True)\n        os.makedirs(rels_dir, exist_ok=True)\n\n     \
          \   # 1️⃣ 写入 document.xml\n        with open(os.path.join(word_dir, \"document.xml\"\
          ), \"w\", encoding=\"utf-8\") as f:\n            f.write(document_xml)\n\
          \n        # 2️⃣ 必需文件：[Content_Types].xml\n        content_types = \"\"\"\
          <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<Types xmlns=\"http://schemas.openxmlformats.org/package/2006/content-types\"\
          >\n  <Default Extension=\"rels\" ContentType=\"application/vnd.openxmlformats-package.relationships+xml\"\
          />\n  <Default Extension=\"xml\" ContentType=\"application/xml\"/>\n  <Override\
          \ PartName=\"/word/document.xml\" ContentType=\"application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml\"\
          />\n</Types>\n\"\"\"\n        with open(os.path.join(tmpdir, \"[Content_Types].xml\"\
          ), \"w\", encoding=\"utf-8\") as f:\n            f.write(content_types)\n\
          \n        # 3️⃣ _rels/.rels\n        rels = \"\"\"<?xml version=\"1.0\"\
          \ encoding=\"UTF-8\"?>\n<Relationships xmlns=\"http://schemas.openxmlformats.org/package/2006/relationships\"\
          >\n  <Relationship Id=\"rId1\"\n    Type=\"http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument\"\
          \n    Target=\"word/document.xml\"/>\n</Relationships>\n\"\"\"\n       \
          \ with open(os.path.join(rels_dir, \".rels\"), \"w\", encoding=\"utf-8\"\
          ) as f:\n            f.write(rels)\n\n        # 4️⃣ 打包为 docx\n        output_path\
          \ = os.path.join(tmpdir, \"output.docx\")\n\n        with zipfile.ZipFile(output_path,\
          \ 'w', zipfile.ZIP_DEFLATED) as docx:\n            for foldername, subfolders,\
          \ filenames in os.walk(tmpdir):\n                for filename in filenames:\n\
          \                    file_path = os.path.join(foldername, filename)\n  \
          \                  arcname = os.path.relpath(file_path, tmpdir)\n      \
          \              docx.write(file_path, arcname)\n\n        # 5️⃣ 读取输出\n  \
          \      with open(output_path, \"rb\") as f:\n            docx_binary = f.read()\n\
          \n        return {\n            \"docx_file\": docx_binary\n        }"
        code_language: python3
