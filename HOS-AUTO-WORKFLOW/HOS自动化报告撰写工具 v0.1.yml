    - data:
        code: "import xml.etree.ElementTree as ET\nimport re\nfrom xml.dom import\
          \ minidom\n\ndef prettify_xml(elem):\n    \"\"\"美化XML输出\"\"\"\n    rough_string\
          \ = ET.tostring(elem, 'utf-8')\n    reparsed = minidom.parseString(rough_string)\n\
          \    return reparsed.toprettyxml(indent=\"  \")\n\ndef clean_xml(xml_str):\n\
          \    \"\"\"清洗XML字符串\"\"\"\n    try:\n        root = ET.fromstring(xml_str)\n\
          \        return prettify_xml(root)\n    except Exception as e:\n       \
          \ return f\"<error>Invalid XML: {str(e)}</error>\"\n\ndef markdown_to_xml(md_text):\n\
          \    \"\"\"\n    Markdown → XML（无模板）\n    仅结构化，不做语义推理\n    \"\"\"\n    root\
          \ = ET.Element(\"document\")\n\n    lines = md_text.split(\"\\n\")\n   \
          \ current_section = None\n\n    for line in lines:\n        line = line.strip()\n\
          \n        # 标题\n        if line.startswith(\"#\"):\n            level =\
          \ len(line) - len(line.lstrip(\"#\"))\n            title_text = line.lstrip(\"\
          #\").strip()\n\n            section = ET.SubElement(root, \"section\")\n\
          \            section.set(\"level\", str(level))\n\n            title = ET.SubElement(section,\
          \ \"title\")\n            title.text = title_text\n\n            current_section\
          \ = section\n\n        # 代码块\n        elif line.startswith(\"```\"):\n \
          \           code = ET.SubElement(root, \"codeblock\")\n            code.set(\"\
          lang\", line.replace(\"```\", \"\").strip())\n\n        # 普通段落\n       \
          \ elif line:\n            parent = current_section if current_section is\
          \ not None else root\n            p = ET.SubElement(parent, \"paragraph\"\
          )\n            p.text = line\n\n    return prettify_xml(root)\n\ndef handler(inputs:\
          \ dict) -> dict:\n    \"\"\"\n    输入：\n        inputs[\"xml_template\"]\
          \  -> LLM输出的“干净XML模板”\n        inputs[\"markdown\"]      -> Markdown文本\n\
          \n    输出：\n        {\n            \"template_xml\": \"...\",\n         \
          \   \"markdown_xml\": \"...\"\n        }\n    \"\"\"\n\n    xml_template\
          \ = inputs.get(\"xml_template\", \"\")\n    markdown = inputs.get(\"markdown\"\
          , \"\")\n\n    # 1️⃣ 处理模板XML（来源1）\n    template_xml = clean_xml(xml_template)\
          \ if xml_template else \"\"\n\n    # 2️⃣ Markdown → XML（来源2）\n    markdown_xml\
          \ = markdown_to_xml(markdown) if markdown else \"\"\n\n    return {\n  \
          \      \"template_xml\": template_xml,\n        \"markdown_xml\": markdown_xml\n\
          \    }"
        code_language: python3
        outputs:
          result:
            children: null
            type: string
